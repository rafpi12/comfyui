<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Model Manager Pro - Ultimate Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; }
        select, input { background: #111827 !important; color: white !important; border: 1px solid #475569 !important; padding: 10px !important; border-radius: 8px; font-size: 0.9rem !important; }
        #models-ui { min-height: 400px; font-family: monospace; }
        #log-console { height: 120px; overflow-y: auto; background: #000; color: #4ade80; font-family: monospace; font-size: 0.8rem; padding: 10px; border-radius: 8px; border: 1px solid #334155; }
        .btn-action { transition: all 0.2s; font-weight: bold; padding: 12px; border-radius: 10px; text-transform: uppercase; }
        #github-toast { position: fixed; bottom: 20px; right: 20px; background: #16a34a; color: white; padding: 12px 20px; border-radius: 10px; display: flex; align-items: center; gap: 10px; transform: translateY(100px); transition: transform 0.3s ease; z-index: 1000; }
        #github-toast.show { transform: translateY(0); }
        #path-browser { position: absolute; width: 100%; top: 100%; left: 0; background: #1e293b; border: 1px solid #475569; border-radius: 8px; max-height: 150px; overflow-y: auto; z-index: 50; display: none; }
        .path-item { padding: 8px 12px; font-size: 11px; cursor: pointer; border-bottom: 1px solid #334155; }
        .path-item:hover { background: #334155; color: #60a5fa; }
    </style>
</head>
<body class="p-8">
    <div id="github-toast"><i class="fab fa-github"></i><span>Catalogue synchronisé !</span></div>
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-black text-blue-400 uppercase tracking-tighter">Model Manager Pro</h1>
            <div class="flex gap-3">
                <div id="disk-widget" class="bg-slate-800 px-4 py-2 rounded-lg flex flex-col gap-1.5 min-w-[200px]">
                    <div class="flex justify-between items-center">
                        <span class="text-[9px] font-bold uppercase text-slate-500 tracking-widest">📁 /workspace</span>
                        <span class="text-[9px] font-mono text-slate-400"><span id="ws-used">—</span> / <span id="ws-total">—</span></span>
                    </div>
                    <div class="w-full bg-slate-700 h-1.5 rounded-full overflow-hidden">
                        <div id="ws-bar" class="h-1.5 rounded-full bg-blue-500 transition-all duration-500" style="width:0%"></div>
                    </div>
                    <div class="text-[9px] font-mono text-right">
                        <span class="text-green-400" id="ws-free">—</span><span class="text-slate-500"> libre</span>
                    </div>
                </div>
                <button onclick="fetch('/purge',{method:'POST'})" class="bg-slate-800 px-5 py-2 rounded-lg text-xs font-bold hover:bg-slate-700">PURGER ARIA2</button>
                <button onclick="syncGithub()" class="bg-slate-800 px-5 py-2 rounded-lg text-xs font-bold hover:bg-slate-700 text-green-400"><i class="fab fa-github mr-1"></i>SYNC</button>
                <button onclick="location.reload()" class="bg-slate-800 px-5 py-2 rounded-lg text-xs font-bold hover:bg-slate-700">ACTUALISER</button>
            </div>
        </div>

        <div class="card p-8 mb-8 shadow-2xl border-t-4 border-blue-500">
            <div class="flex gap-4 mb-6">
                <select id="env-ui" class="w-1/4" onchange="loadModels()"></select>
                <select id="type-ui" class="w-1/4" onchange="loadModels()">
                    <option value="all">TOUTES CATÉGORIES</option>
                    <option value="diffusion_models">DIFFUSION MODELS</option>
                    <option value="loras">LORAS</option>
                    <option value="vae">VAE</option>
                    <option value="clip">CLIP / TEXT ENCODERS</option>
                    <option value="unet">UNET / GGUF</option>
                    <option value="upscale_models">UPSCALERS</option>
                    <option value="controlnet">CONTROLNET</option>
                </select>
                <input id="search-ui" type="text" placeholder="Rechercher..." class="flex-1" onkeyup="loadModels()">
            </div>
            <div class="bg-black/40 p-6 rounded-xl border border-slate-700">
                <div class="flex justify-between mb-4 items-center text-[10px]">
                    <div class="flex items-center gap-3">
                        <div id="diode-ui" class="w-3 h-3 rounded-full bg-red-500 transition-all duration-500"></div>
                        <span id="status-text" class="uppercase text-gray-400 font-bold">Sélection multiple prête</span>
                    </div>
                    <div id="path-ui" class="text-gray-500 italic truncate max-w-md">Prêt.</div>
                </div>
                <div class="mb-6">
                    <div class="flex text-[9px] font-bold uppercase text-slate-500 px-2 mb-1 select-none">
                        <div class="flex-1 cursor-pointer hover:text-blue-400 flex items-center gap-1" onclick="setSortAndReload('name')" id="sort-name">
                            Fichier <span id="sort-name-icon">↕</span>
                        </div>
                        <div class="w-20 text-right cursor-pointer hover:text-blue-400 flex items-center justify-end gap-1" onclick="setSortAndReload('size')" id="sort-size">
                            <span id="sort-size-icon">↕</span> Taille
                        </div>
                    </div>
                    <select id="models-ui" class="w-full" style="height:180px" multiple onclick="syncToEditor()" onchange="checkStatus()"></select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="startSmartDownload()" class="btn-action bg-blue-600 hover:bg-blue-500 shadow-lg">Télécharger la sélection</button>
                    <button id="delete-btn" onclick="deleteFromDisk()" class="btn-action bg-red-900/50 text-red-500 border border-red-500 opacity-20" disabled>Supprimer la sélection</button>
                </div>
            </div>
        </div>

        <div id="tasks-ui" class="space-y-3 mb-8"></div>

        <div class="card p-8 shadow-xl border-t-4 border-yellow-600 mb-8">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xs font-bold text-yellow-500 uppercase tracking-widest">Éditeur Catalogue</h2>
                <button onclick="resetEditor()" class="text-[10px] bg-slate-700 px-2 py-1 rounded hover:bg-slate-600">VIDER</button>
            </div>
            <div class="grid grid-cols-2 gap-8">
                <div class="space-y-3 bg-black/20 p-5 rounded-xl">
                    <div class="grid grid-cols-2 gap-3">
                        <select id="edit-env" class="w-full">
                            <option value="Z-Image">Z-Image</option><option value="Flux">Flux</option><option value="SDXL">SDXL</option><option value="Qwen">Qwen</option><option value="Wan">Wan</option><option value="ACE-Step">ACE-Step</option><option value="Ernie">Ernie</option><option value="Anima">Anima</option><option value="SeedVR">SeedVR</option><option value="LTX">LTX</option>
                        </select>
                        <select id="edit-cat" class="w-full" onchange="updatePathByCategory()">
                            <option value="diffusion_models">diffusion_models</option><option value="loras">loras</option><option value="vae">vae</option><option value="clip">clip</option><option value="unet">unet</option><option value="text_encoders">text_encoders</option><option value="upscale_models">upscale_models</option><option value="controlnet">controlnet</option><option value="model_patches">model_patches</option>
                        </select>
                    </div>
                    <div class="relative">
                        <div class="flex items-center gap-2">
                            <input id="edit-path" placeholder="Chemin" class="flex-1 text-[10px]">
                            <button onclick="togglePathBrowser()" class="bg-slate-800 p-2 rounded hover:bg-slate-700"><i class="fas fa-folder-open text-blue-400"></i></button>
                        </div>
                        <div id="path-browser"></div>
                    </div>
                    <input id="edit-url" placeholder="URL" class="w-full text-xs" oninput="autoFetchName(this.value)">
                    <input id="edit-file" placeholder="Fichier" class="w-full bg-slate-900 text-xs font-bold">
                    <button onclick="saveToCatalogue()" class="w-full bg-yellow-600 py-2 rounded-lg font-bold text-sm">ENREGISTRER</button>
                </div>
                <div id="catalogue-list" class="space-y-1 text-[10px] bg-black/30 p-4 rounded-xl overflow-y-auto max-h-[250px]"></div>
            </div>
        </div>
        <div id="log-console"></div>
    </div>

    <script>
        const BASE_PATH = "/workspace/ComfyUI/models/";
        let cfg = {}; let diskFiles = {}; let lastCompleteCount = 0;
        let sortState = { key: 'name', dir: 1 };

        function formatSize(bytes) {
            if (!bytes) return '—';
            if (bytes >= 1_073_741_824) return (bytes / 1_073_741_824).toFixed(2) + ' Go';
            if (bytes >= 1_048_576) return (bytes / 1_048_576).toFixed(0) + ' Mo';
            return (bytes / 1024).toFixed(0) + ' Ko';
        }

        function addLog(msg, isError = false) {
            const con = document.getElementById('log-console');
            con.innerHTML += `<div style="color:${isError ? '#ff4d4d' : '#4ade80'}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            con.scrollTop = con.scrollHeight;
        }

        async function start() {
            try {
                const r = await fetch('/config'); cfg = await r.json();
                const envSelector = document.getElementById('env-ui'); envSelector.innerHTML = "";
                const environments = Object.keys(cfg).sort((a, b) => a.localeCompare(b));
                envSelector.add(new Option("Tous les environnements", "__ALL__"));
                environments.forEach(env => envSelector.add(new Option(env, env)));
                envSelector.value = "__ALL__"; // défaut : tout afficher
                await updateDiskState(); loadModels(); renderCatalogue(); setInterval(loop, 2000); updateDiskWidget(); setInterval(updateDiskWidget, 30000);
                setTimeout(async () => { await updateDiskState(); loadModels(); }, 3000);
            } catch(e) { }
        }

        async function updateDiskState() { const r = await fetch('/scan-disk'); diskFiles = await r.json(); }

        async function updateDiskWidget() {
            try {
                const r = await fetch('/disk-usage');
                const d = await r.json();
                const fmt = v => v.toFixed(1) + ' Go';
                if (d.workspace) {
                    const ws = d.workspace;
                    document.getElementById('ws-used').textContent = fmt(ws.used_gb);
                    if (ws.total_gb !== null) {
                        document.getElementById('ws-total').textContent = fmt(ws.total_gb);
                        document.getElementById('ws-free').textContent = fmt(ws.free_gb);
                        const color = ws.used_pct > 85 ? 'bg-red-500' : ws.used_pct > 65 ? 'bg-yellow-500' : 'bg-blue-500';
                        document.getElementById('ws-bar').style.width = ws.used_pct + '%';
                        document.getElementById('ws-bar').className = 'h-1.5 rounded-full transition-all duration-500 ' + color;
                    } else {
                        // Pas de quota défini : on cache total/libre/barre
                        document.getElementById('ws-total').textContent = '? Go';
                        document.getElementById('ws-free').textContent = '—';
                        document.getElementById('ws-bar').style.width = '0%';
                    }
                }
            } catch(e) {}
        }

        function loadModels(targetFilename = null) {
            const m = document.getElementById('models-ui'); const env = document.getElementById('env-ui').value;
            const type = document.getElementById('type-ui').value; const search = document.getElementById('search-ui').value.toLowerCase();
            const savedScroll = m.scrollTop; const selectedValues = targetFilename ? [targetFilename] : Array.from(m.selectedOptions).map(o => o.value);
            m.innerHTML = "";
            if (env !== "__ALL__" && !cfg[env]) return;

            let allModels = [];

            // Environnements à parcourir : un seul ou tous
            const envsToScan = env === "__ALL__" ? Object.keys(cfg) : [env];

            envsToScan.forEach(e => {
    Object.keys(cfg[e]).forEach(cat => {
        let matchType = (type === 'all');
        if (!matchType) {
            if (type === 'clip') matchType = (cat.includes('clip') || cat.includes('text_encoders'));
            else if (type === 'unet') matchType = (cat.includes('unet') || cat.includes('diffusion_models'));
            else matchType = cat.toLowerCase().includes(type.toLowerCase());
        }
        if (matchType) {
            cfg[e][cat].forEach(model => {
                if(model.filename.toLowerCase().includes(search)) {
                    allModels.push({ ...model, _env: e });  // ← on copie le modèle avec son env
                }
            });
        }
    });
});

            // Injecter les dossiers disk-only (prompt_generator, LLM) dans allModels
            const folderCategoryMap = { "prompt_generator": "Qwen", "LLM": "Qwen" };
            const folderCategories = ["prompt_generator", "LLM"];
            folderCategories.forEach(cat => {
                const ownerEnv = folderCategoryMap[cat];
                if (env !== "__ALL__" && env !== ownerEnv) return;
                (diskFiles[cat] || []).forEach(entry => {
                    if (!entry.is_folder) return;
                    if (!entry.path.toLowerCase().includes(search)) return;
                    allModels.push({
                        filename: entry.path,
                        path: cat,
                        category: cat,
                        url: "",
                        _env: "",
                        _isFolder: true,
                        _folderSize: entry.size || 0,
                    });
                });
            });

            // PASSE 1 : calculer _diskSize sur tous les modèles avant le tri
            allModels.forEach(model => {
                if (model._isFolder) {
                    model._diskSize = model._folderSize || 0;
                } else {
                    const diskKey = model.path.split('/')[0];
                    const diskCategoryFiles = diskFiles[diskKey] || [];
                    const diskEntry = diskCategoryFiles.find(f => (f.path || f).toLowerCase() === model.filename.toLowerCase());
                    model._diskSize = diskEntry ? (diskEntry.size || 0) : 0;
                }
            });

            // TRI DYNAMIQUE
            allModels.sort((a, b) => {
                if (sortState.key === 'size') {
                    return ((a._diskSize || 0) - (b._diskSize || 0)) * sortState.dir;
                }
                return a.filename.localeCompare(b.filename) * sortState.dir;
            });

            // Remplissage du select
            allModels.forEach(model => {
                let label, o;
                if (model._isFolder) {
                    label = "● 📁 " + model.filename + "  [" + formatSize(model._folderSize) + "]";
                    o = new Option(label, model.filename);
                    o.dataset.url = "";
                    o.dataset.cat = model.path;
                    o.dataset.category = model.category;
                    o.dataset.env = "";
                    o.dataset.size = model._folderSize || 0;
                    o.dataset.isFolder = "true";
                    o.style.color = "#4ade80";
                } else {
                    const displayCat = model.category || model.path.split('/')[0];
                    const diskKey = model.path.split('/')[0];
                    const diskCategoryFiles = diskFiles[diskKey] || [];
                    const diskEntry = diskCategoryFiles.find(f => (f.path || f).toLowerCase() === model.filename.toLowerCase());
                    const isPresent = !!diskEntry;
                    const fileSize = diskEntry ? diskEntry.size : null;
                    label = (isPresent ? "● " : "○ ") + model.filename + (isPresent && fileSize ? "  [" + formatSize(fileSize) + "]" : "");
                    o = new Option(label, model.filename);
                    o.dataset.url = model.url;
                    o.dataset.cat = model.path;
                    o.dataset.category = displayCat;
                    o.dataset.env = model._env || "";
                    o.dataset.size = fileSize || 0;
                    if(isPresent) o.style.color = "#4ade80";
                }
                if (selectedValues.includes(model.filename)) o.selected = true;
                m.add(o);
            });
            
            m.scrollTop = targetFilename ? (Array.from(m.options).findIndex(o => o.selected) * 24) : savedScroll;
        }

        async function checkStatus() {
            const s = Array.from(document.getElementById('models-ui').selectedOptions); 
            const delBtn = document.getElementById('delete-btn');
            delBtn.disabled = s.length === 0;
            delBtn.className = s.length > 0 ? "btn-action bg-red-600 text-white" : "btn-action bg-red-900/50 text-red-500 opacity-20";
        }

        function syncToEditor() {
            const s = Array.from(document.getElementById('models-ui').selectedOptions); if(s.length !== 1) return;
            const o = s[0]; const cleanName = o.value.replace(/^[●○]\s/, "");
            const envVal = o.dataset.env || document.getElementById('env-ui').value;
            document.getElementById('edit-env').value = envVal;
            document.getElementById('edit-cat').value = o.dataset.category || o.dataset.cat.split('/')[0];
            document.getElementById('edit-path').value = BASE_PATH + o.dataset.cat;
            document.getElementById('edit-url').value = o.dataset.url;
            document.getElementById('edit-file').value = cleanName;
			renderCatalogue(cleanName); // ← cette ligne manquait
        }

        async function startSmartDownload() {
            const s = Array.from(document.getElementById('models-ui').selectedOptions);
            if(s.length === 0) {
                const url = document.getElementById('edit-url').value;
                const path = document.getElementById('edit-path').value.replace(BASE_PATH, "");
                const file = document.getElementById('edit-file').value;
                if(!url || !file) return;
                await fetch('/download', { method:'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({url, path, filename: file}) });
                addLog(`Lancement : ${file}`);
            } else {
                if(!confirm(`Lancer le téléchargement de ${s.length} fichier(s) ?`)) return;
                for(let o of s) {
                    const name = o.value.replace(/^[●○]\s/, "");
                    await fetch('/download', { 
                        method:'POST', 
                        headers: {'Content-Type': 'application/json'}, 
                        body: JSON.stringify({url: o.dataset.url, path: o.dataset.cat, filename: name}) 
                    });
                    addLog(`Ajout file d'attente : ${name}`);
                }
            }
        }

        async function deleteFromDisk() {
            const s = Array.from(document.getElementById('models-ui').selectedOptions);
            if(s.length === 0) return;
            if(!confirm(`Supprimer définitivement ${s.length} fichier(s) du disque ?`)) return;
            for(let o of s) {
                const name = o.value.replace(/^[●○]\s/, "");
                await fetch(`/delete?cat=${encodeURIComponent(o.dataset.cat)}&file=${encodeURIComponent(name)}`, {method:'DELETE'});
                addLog(`Supprimé : ${name}`);
            }
            await updateDiskState(); loadModels();
        }

        function showGitHubToast() { const t = document.getElementById('github-toast'); t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }
        async function syncGithub() {
            const r = await fetch('/sync-github', { method: 'POST' });
            const d = await r.json();
            if (d.status === 'ok') showGitHubToast();
            else addLog('Sync GitHub échoué : ' + (d.message || ''), true);
        }
        function resetEditor() { document.getElementById('edit-url').value = ""; document.getElementById('edit-file').value = ""; document.getElementById('edit-path').value = ""; hidePathBrowser(); }
        function updatePathByCategory() { const cat = document.getElementById('edit-cat').value; document.getElementById('edit-path').value = BASE_PATH + cat; hidePathBrowser(); }
        async function togglePathBrowser() {
            const browser = document.getElementById('path-browser');
            if (browser.style.display === "block") hidePathBrowser();
            else {
                const cat = document.getElementById('edit-cat').value;
                const r = await fetch(`/list-subfolders?category=${cat}`);
                const folders = await r.json();
                browser.innerHTML = folders.map(f => `<div class="path-item flex items-center gap-2" onclick="setPath('${cat}', '${f}')">${f === "" ? '<span class="text-blue-400">⤴️</span> Dossier Racine' : '<i class="fas fa-folder text-yellow-500"></i> ' + f}</div>`).join('');
                browser.style.display = "block";
            }
        }
        function hidePathBrowser() { document.getElementById('path-browser').style.display = "none"; }
        function setPath(cat, sub) { const cleanSub = sub === "" ? "" : (sub.startsWith('/') ? sub : '/' + sub); document.getElementById('edit-path').value = BASE_PATH + cat + cleanSub; hidePathBrowser(); }
        async function autoFetchName(url) {
            const fileInput = document.getElementById('edit-file'); if (!url) return;
            fileInput.value = "⏳...";
            if (url.includes('huggingface.co')) fileInput.value = url.split('/').pop().split('?')[0];
            else if (url.includes('civitai.com') || url.includes('civitai.red')) {
                const r = await fetch(`/fetch-civitai-name?url=${encodeURIComponent(url)}`);
                const d = await r.json(); fileInput.value = d.filename || "";
            }
        }
        async function loop() {
            try {
                const tasks = await (await fetch('/progress')).json();
                const completeCount = tasks.filter(t => t.status.includes('complete')).length;
                if (completeCount !== lastCompleteCount) { lastCompleteCount = completeCount; await updateDiskState(); loadModels(); }
                document.getElementById('tasks-ui').innerHTML = tasks.length === 0 ? '' : tasks.map(t => {
                    const isError = t.status.includes('error') || t.status.includes('Erreur');
                    const isDone = t.status === 'complete';
                    const isActive = t.status === 'active';
                    const isWaiting = isActive && t.progress === 0 && t.speed === '0 o/s';
                    const borderColor = isError ? 'border-red-500' : (isDone ? 'border-green-500' : 'border-blue-500');
                    const barColor = isError ? 'bg-red-500' : (isDone ? 'bg-green-500' : 'bg-blue-500');
                    const pct = Math.round(t.progress || 0);
                    const statusLabel = isError ? t.status : (isDone ? 'TERMINÉ' : (isActive ? 'EN COURS' : t.status.toUpperCase()));
                    const bar = isWaiting
                        ? `<div class="h-2 rounded-full bg-slate-600 animate-pulse" style="width:100%"></div>`
                        : `<div class="${barColor} h-2 rounded-full transition-all duration-500" style="width:${pct}%"></div>`;
                    const speedLabel = isWaiting ? '⏳ En attente...' : (isActive ? '⚡ ' + t.speed : (isDone ? '✅ Terminé' : ''));
                    const pctLabel = isWaiting ? '' : (pct + '%' + (isActive && t.eta ? ' · ETA ' + t.eta : ''));
                    return `<div class="bg-slate-900/80 p-4 rounded-xl border-l-4 ${borderColor}">
                        <div class="flex justify-between text-[11px] mb-2 font-bold">
                            <span class="truncate max-w-[60%] text-white">${t.name}</span>
                            <span class="${isError ? 'text-red-400' : (isDone ? 'text-green-400' : 'text-blue-300')}">${statusLabel}</span>
                        </div>
                        <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden mb-2">${bar}</div>
                        <div class="flex justify-between text-[10px] text-slate-400">
                            <span>${speedLabel}</span>
                            <span class="font-mono font-bold ${isDone ? 'text-green-400' : 'text-white'}">${pctLabel}</span>
                        </div>
                    </div>`;
                }).join('');
            } catch(e) {}
        }
        async function saveToCatalogue() {
    const env = document.getElementById('edit-env').value;
    const cat = document.getElementById('edit-cat').value;
    const fullPath = document.getElementById('edit-path').value;
    const url = document.getElementById('edit-url').value;
    const file = document.getElementById('edit-file').value;

    // Validation : bloquer toute sauvegarde incomplète
    if (!env || !cat || !file || !url) {
        addLog('⚠️ Environnement, catégorie, fichier et URL sont obligatoires.', true);
        return;
    }

    const relPath = fullPath.replace(BASE_PATH, "").replace(/^\/+/, "");
    const obj = { name: file, url: url, path: relPath, category: cat, filename: file };
    if (!cfg[env]) cfg[env] = {};
    if (!cfg[env][cat]) cfg[env][cat] = [];
    const idx = cfg[env][cat].findIndex(m => m.filename === file);
    if (idx > -1) cfg[env][cat][idx] = obj; else cfg[env][cat].push(obj);
    const r = await fetch('/save-config', { method: 'POST', body: JSON.stringify(cfg) });
    if ((await r.json()).github_sync) showGitHubToast();
    loadModels(file);
    renderCatalogue(file);
}
        function renderCatalogue(filterFile = null) {
            const list = document.getElementById('catalogue-list'); list.innerHTML = "";
            Object.keys(cfg).forEach(env => Object.keys(cfg[env]).forEach(cat => cfg[env][cat].forEach((m, idx) => {
        if (filterFile && m.filename !== filterFile) return;
        list.innerHTML += `<div class="flex justify-between items-center bg-black/40 p-2 mb-1 border border-white/5 rounded ${filterFile ? 'file-highlight' : ''}" id="cat-entry-${m.filename.replace(/\W/g,'_')}"><div class="flex flex-col"><span class="text-blue-400 font-bold uppercase" style="font-size:8px">${env} / ${cat}</span><span class="truncate italic text-slate-300">${m.filename}</span></div><button onclick="removeFromCatalogue('${env}','${cat}',${idx})" class="text-red-500 ml-2"><i class="fas fa-times"></i></button></div>`;
    })));
    // Scroll interne à la liste catalogue uniquement (sans focus page)
    if (filterFile) {
        const id = "cat-entry-" + filterFile.replace(/\W/g, '_');
        const el = document.getElementById(id);
        if (el) setTimeout(() => {
            const list = document.getElementById('catalogue-list');
            list.scrollTop = el.offsetTop - list.offsetTop - 10;
        }, 50);
    }
}
        async function removeFromCatalogue(e,c,i) { if(confirm('Supprimer du JSON ?')) { cfg[e][c].splice(i, 1); await fetch('/save-config', { method: 'POST', body: JSON.stringify(cfg) }); renderCatalogue(); loadModels(); } }
        
        function setSortAndReload(key) {
            if (sortState.key === key) sortState.dir *= -1;
            else { sortState.key = key; sortState.dir = 1; }
            updateSortIcons();
            loadModels();
        }
        function updateSortIcons() {
            const arrow = sortState.dir === 1 ? '↑' : '↓';
            document.getElementById('sort-name-icon').textContent = sortState.key === 'name' ? arrow : '↕';
            document.getElementById('sort-size-icon').textContent = sortState.key === 'size' ? arrow : '↕';
            document.getElementById('sort-name').className = `flex-1 cursor-pointer flex items-center gap-1 ${sortState.key === 'name' ? 'text-blue-400' : 'text-slate-500 hover:text-blue-400'}`;
            document.getElementById('sort-size').className = `w-20 text-right cursor-pointer flex items-center justify-end gap-1 ${sortState.key === 'size' ? 'text-blue-400' : 'text-slate-500 hover:text-blue-400'}`;
        }
        start();
    </script>
</body>
</html>
